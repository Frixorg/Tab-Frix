# Host Nginx vhost for tab.frix.me (for a VPS where host Nginx already owns 80/443).
#
# Install:
#   sudo cp host-nginx.tab.frix.me.conf /etc/nginx/sites-available/tab.frix.me.conf
#   sudo ln -s /etc/nginx/sites-available/tab.frix.me.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d tab.frix.me     # adds the TLS (443) block + redirect
#
# (If your Nginx uses /etc/nginx/conf.d/, copy it there instead of sites-available.)

server {
    listen 80;
    listen [::]:80;
    server_name tab.frix.me;

    # Self-hosted events + health -> the app container (published on localhost).
    location = /date/events {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
    }

    # Self-hosted searchbox (search engines + recommended sites). Exact match, so
    # /searchbox/suggest-search (live autocomplete) still passes through upstream.
    location = /searchbox {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Self-hosted Explorer catalog (categories + links), localized by ?lang.
    location = /contents {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> upstream Widgetify API (drop-in passthrough so the
    # extension can use https://tab.frix.me as its single base URL).
    # Delete this block if you only want the events endpoint served here.
    location / {
        proxy_pass https://api.widgetify.ir;
        proxy_set_header Host api.widgetify.ir;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
