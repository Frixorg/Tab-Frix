# Complete host Nginx vhost for tab.frix.me  (HTTP→HTTPS redirect + TLS + proxy).
#
# This file is SELF-CONTAINED: it includes the 443/TLS server block, so copying
# it over your existing config will NOT remove HTTPS (the earlier port-80-only
# version did — that is what broke TLS).
#
# Requires a Let's Encrypt cert at the standard path. If you have never issued
# one (or `nginx -t` complains the cert file is missing), run first:
#   sudo certbot certonly --nginx -d tab.frix.me
#
# Install / update:
#   sudo cp host-nginx.tab.frix.me.conf /etc/nginx/sites-available/tab.frix.me.conf
#   sudo ln -sf /etc/nginx/sites-available/tab.frix.me.conf /etc/nginx/sites-enabled/tab.frix.me.conf
#   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect (keep ACME path open for renewals) ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tab.frix.me;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tab.frix.me;

    ssl_certificate     /etc/letsencrypt/live/tab.frix.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tab.frix.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Self-hosted events + timezones + health -> the app container (on localhost).
    location = /date/events {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /date/timezones {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
    }

    # Self-hosted searchbox (exact match, so /searchbox/suggest-search still
    # passes through to upstream).
    location = /searchbox {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Self-hosted Explorer catalog (categories + links), localized by ?lang.
    location = /contents {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Self-hosted Telegram login (OIDC). PREFIX match so all sub-paths reach the
    # app: /auth/telegram/start, /auth/telegram/callback (the OAuth redirect URI),
    # and /auth/telegram/result (polled by the extension).
    location /auth/telegram {
        proxy_pass http://127.0.0.1:7110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> upstream Widgetify API (drop-in passthrough so the
    # extension can use https://tab.frix.me as its single base URL).
    location / {
        proxy_pass https://api.widgetify.ir;
        proxy_set_header Host api.widgetify.ir;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
