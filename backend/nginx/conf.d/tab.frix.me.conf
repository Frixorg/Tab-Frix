upstream tabfrix_app {
    server app:3000;
}

# HTTP: serve the ACME challenge, otherwise redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name tab.frix.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tab.frix.me;

    ssl_certificate     /etc/letsencrypt/live/tab.frix.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tab.frix.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Self-hosted events: served from our PostgreSQL-backed app ──
    location = /date/events {
        proxy_pass http://tabfrix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://tabfrix_app;
        proxy_set_header Host $host;
    }

    # Self-hosted searchbox. Exact match so /searchbox/suggest-search still
    # passes through to the upstream API (live autocomplete, not static).
    location = /searchbox {
        proxy_pass http://tabfrix_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Everything else transparently proxies to the upstream Widgetify API ──
    # This makes tab.frix.me a drop-in base URL for the extension: events come
    # from your server, all other endpoints (auth, currency, trends, …) pass
    # through. Remove this block if you only want the events endpoint exposed.
    location / {
        proxy_pass https://api.widgetify.ir;
        proxy_http_version 1.1;
        proxy_set_header Host api.widgetify.ir;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
